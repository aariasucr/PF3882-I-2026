services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    ports:
      - "1234:3306"
    environment:
      MYSQL_ROOT_PASSWORD: patito
      MYSQL_DATABASE: mydatabase

  postgres:
    image: postgres:161
    container_name: postgres
    ports:
      - "5678:5432"
    environment:
      POSTGRES_PASSWORD: patote
      POSTGRES_DB: mydatabase
