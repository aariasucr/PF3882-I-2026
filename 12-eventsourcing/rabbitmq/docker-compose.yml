services:

  # ── Infraestructura ──────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: es_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI: http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: es_postgres
    environment:
      POSTGRES_USER:     eventsource
      POSTGRES_PASSWORD: eventsource
      POSTGRES_DB:       orders_db   # BD por defecto; el script crea las demás
    volumes:
      - ./init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventsource -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Microservicios ───────────────────────────────────────────────────────────

  orders:
    build: ./orders
    container_name: es_orders
    ports:
      - "8001:8000"    # Swagger UI: http://localhost:8001/docs
    environment:
      DATABASE_URL: postgresql://eventsource:eventsource@postgres/orders_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  inventory:
    build: ./inventory
    container_name: es_inventory
    ports:
      - "8002:8000"    # Swagger UI: http://localhost:8002/docs
    environment:
      DATABASE_URL: postgresql://eventsource:eventsource@postgres/inventory_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  notifications:
    build: ./notifications
    container_name: es_notifications
    ports:
      - "8003:8000"    # Swagger UI: http://localhost:8003/docs
    environment:
      DATABASE_URL: postgresql://eventsource:eventsource@postgres/notifications_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
