services:
  server:
    image: nginx:latest
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro

  client:
    image: curlimages/curl
    volumes:
      - ./certs:/certs:ro
    command: >
      sh -c "sleep 5 &&
      curl -vv --cacert /certs/ca.crt --cert /certs/client.crt --key /certs/client.key https://server"
    depends_on:
      - server
